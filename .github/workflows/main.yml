name: GHA-CICD 

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
          
  security:
    needs: docker
    runs-on: self-hosted

    steps:
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/xora:xora-v${{ github.run_number }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/Xora:Xora-v${{ github.run_number }}

  deploy:
    needs: security
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: k3s/

      - name: Deploy to k3s
        run: |
          export KUBECONFIG=~/.kube/config

          # 1. Update image tag
          NEW_IMAGE="${{ secrets.DOCKER_USERNAME }}/Xora:Xora-v${{ github.run_number }}"
          sed -i "s|image:.*|image: ${NEW_IMAGE}|g" k3s/deployment.yaml

          # 2. Apply manifests
          kubectl apply -f k3s/

          # 3. Check rollout
          kubectl rollout status deployment/app-fe-deployment -n xora-cicd
